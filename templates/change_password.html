{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-title">Change Password</div>
  <a href="{{ url_for('home') }}" class="btn btn-outline btn-sm">Back</a>
</div>

<div style="max-width:440px;">
  <div class="card">
    <div class="card-header dark">Update Your Password</div>
    <div class="card-body">
      <form method="POST">

        <div class="form-group">
          <label>Current Password <span class="req">*</span></label>
          <input type="password" name="current_password" placeholder="Enter current password" required>
        </div>

        <hr>

        <div class="form-group">
          <label>New Password <span class="req">*</span></label>
          <input type="password" name="new_password" id="new_pwd"
                 placeholder="Minimum 6 characters" required minlength="6">
        </div>

        <div class="form-group">
          <label>Confirm New Password <span class="req">*</span></label>
          <input type="password" name="confirm_password" id="confirm_pwd"
                 placeholder="Repeat new password" required minlength="6">
          <div class="form-hint" id="match-hint" style="display:none; color:var(--red);">
            Passwords do not match.
          </div>
        </div>

        <hr>

        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary">Save New Password</button>
          <a href="{{ url_for('home') }}" class="btn btn-outline">Cancel</a>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
  // Live match check
  const np = document.getElementById('new_pwd');
  const cp = document.getElementById('confirm_pwd');
  const hint = document.getElementById('match-hint');
  function checkMatch() {
    if (cp.value && np.value !== cp.value) {
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
  }
  np.addEventListener('input', checkMatch);
  cp.addEventListener('input', checkMatch);
</script>

{% endblock %}
