<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In – MSSCO</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Hard reset — override all body/html styles from main CSS */
    html {
      height: 100%;
    }
    body {
      all: unset;
      display: flex !important;
      min-height: 100vh;
      height: 100%;
      width: 100%;
      background: #2B3990;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #1a1a2e;
      box-sizing: border-box;
    }

    .login-wrap {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Left panel — decorative brand side */
    .login-left {
      flex: 1;
      background: linear-gradient(145deg, #1e2a6e 0%, #2B3990 50%, #3d50b8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }
    .login-left::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      top: -80px; left: -80px;
    }
    .login-left::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      bottom: -60px; right: -60px;
    }
    .login-left-content { position: relative; z-index: 1; text-align: center; }
    .login-brand-logo {
      background: white;
      border-radius: 16px;
      padding: 16px 24px;
      display: inline-block;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .login-brand-logo img {
      height: 48px;
      width: auto;
      display: block;
    }
    .login-brand-title {
      color: white;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -.3px;
    }
    .login-brand-sub {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      line-height: 1.6;
      max-width: 280px;
    }
    .login-features {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
    }
    .login-feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }
    .login-feature-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      flex-shrink: 0;
    }

    /* Right panel — form */
    .login-right {
      width: 440px;
      flex-shrink: 0;
      background: #f5f6fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
    }
    .login-form-wrap { width: 100%; }
    .login-form-title {
      font-size: 22px;
      font-weight: 700;
      color: #2B3990;
      margin-bottom: 6px;
    }
    .login-form-sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    /* Form elements */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a2e;
      background: white;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: #2B3990;
      box-shadow: 0 0 0 3px rgba(43,57,144,0.12);
    }
    .show-pw-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
    }
    .show-pw-row input { width: auto; margin: 0; cursor: pointer; accent-color: #2B3990; }

    .btn-signin {
      width: 100%;
      padding: 12px;
      background: #2B3990;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 8px;
    }
    .btn-signin:hover { background: #1e2a6e; transform: translateY(-1px); }
    .btn-signin:active { transform: translateY(0); }

    .login-footer {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 20px;
    }
    .login-footer a { color: #2B3990; font-weight: 600; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    /* Flash messages */
    .flash-danger {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-left: 4px solid #dc2626;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .flash-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-left: 4px solid #16a34a;
      color: #166534;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .flash-warning {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-left: 4px solid #d97706;
      color: #92400e;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-left  { display: none; }
      .login-right { width: 100%; padding: 40px 28px; }
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <!-- Left: Brand panel -->
  <div class="login-left">
    <div class="login-left-content">
      <div class="login-brand-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MSSCO Logo">
      </div>
      <div class="login-brand-title">Mustard Seed Systems Corporation</div>
    </div>
  </div>

  <!-- Right: Form panel -->
  <div class="login-right">
    <div class="login-form-wrap">

      <div class="login-form-title">Welcome back</div>
      <div class="login-form-sub">Sign in to your MSSCO account</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
          <div class="flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}{% endif %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" name="username"
                 placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password"
                 id="pwdField" placeholder="Enter your password" required>
          <label class="show-pw-row">
            <input type="checkbox" onchange="pwdField.type=this.checked?'text':'password'">
            Show password
          </label>
        </div>
        <button type="submit" class="btn-signin">Sign In</button>
      </form>

      <div class="login-footer">
        No account yet? <a href="{{ url_for('register') }}">Register here</a>
      </div>

    </div>
  </div>

</div>
</body>
</html>
